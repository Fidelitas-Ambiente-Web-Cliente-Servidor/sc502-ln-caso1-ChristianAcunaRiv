<body>

<div class="container mt-4">

```
<h1 class="text-center mb-4">Restaurante Gourmet</h1>

<div class="text-center mb-4">
    <button class="btn btn-primary" onclick="filtrarCategoria('Todos')">Todos</button>
    <button class="btn btn-secondary" onclick="filtrarCategoria('Entrada')">Entradas</button>
    <button class="btn btn-secondary" onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>
    <button class="btn btn-secondary" onclick="filtrarCategoria('Postre')">Postres</button>
</div>

<div id="contenedor-menu" class="row mb-5"></div>

<h2>Reservar Mesa</h2>

<form id="form-reserva">

    <div class="mb-3">
        <label>Nombre Completo</label>
        <input type="text" id="nombre" class="form-control">
        <div id="errorNombre" class="error-campo"></div>
    </div>

    <div class="mb-3">
        <label>Correo Electrónico</label>
        <input type="email" id="correo" class="form-control">
        <div id="errorCorreo" class="error-campo"></div>
    </div>

    <div class="mb-3">
        <label>Fecha</label>
        <input type="date" id="fecha" class="form-control">
        <div id="errorFecha" class="error-campo"></div>
    </div>

    <div class="mb-3">
        <label>Hora</label>

        <select id="hora" class="form-control">
            <option value="">Seleccione</option>
            <option>12:00</option>
            <option>13:00</option>
            <option>18:00</option>
            <option>19:00</option>
            <option>20:00</option>
        </select>

    </div>

    <div class="mb-3">
        <label>Número de Personas</label>
        <input type="number" id="personas" class="form-control">
        <div id="errorPersonas" class="error-campo"></div>
    </div>

    <div class="mb-3">
        <label>Comentarios</label>
        <textarea id="comentarios" class="form-control"></textarea>
    </div>

    <button type="submit" id="btnReservar" class="btn btn-success" disabled>
        Reservar
    </button>

</form>

<hr>

<h2>Reservas Registradas</h2>

<table class="table table-bordered">

    <thead>
        <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Personas</th>
        </tr>
    </thead>

    <tbody id="tablaReservas"></tbody>

</table>

<div id="resumen" class="resumen-reservas"></div>
```

</div>

<script src="js/app.js"></script>

</body>
</html>
